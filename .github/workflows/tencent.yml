name: Tencent CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install & Build
        run: bun install && bun run build

      - name: Upload to COS
        run: |
          pip install coscmd
          coscmd config -a ${{ secrets.SECRET_ID }} -s ${{ secrets.SECRET_KEY }} -b ${{ secrets.SECRET_BUCKET }} -r ap-shanghai
          coscmd upload -rs --delete doc_build/ /
